name: Refresh data

on:
  workflow_dispatch:
  push:
    branches:
      - claude/pointless-database-research-G6KkO
      - main
    paths:
      - 'pointless_revision/**'
      - 'scripts/**'
      - '.github/workflows/build-data.yml'
  schedule:
    # First of each month, 06:00 UTC
    - cron: '0 6 1 * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: python -m pip install -r requirements.txt

      - name: Build category JSON from curated fixtures
        run: python scripts/build_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Refresh static category JSON"
            git push
          fi
